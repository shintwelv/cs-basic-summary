<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Operating System | CS-Basic-Summary 🎓</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="학사 수준의 운영체제(Operating System) 전공 기초 지식 정리">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

    <!-- Docsify Dark Theme Overlay -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

    <style>
        /* 우리가 만든 index.css 컨셉을 Docsify에 이식 */
        :root {
            --theme-color: #38bdf8;
            --sidebar-background: #0f172a;
            --background: #0f172a;
            --base-font-size: 16px;
            --mono-font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background-color: var(--background) !important;
            color: #f8fafc !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
        }

        .sidebar {
            background-color: var(--sidebar-background) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #94a3b8 !important;
        }

        .sidebar-nav li a {
            color: #94a3b8 !important;
        }

        .sidebar-nav li.active>a {
            color: var(--theme-color) !important;
            border-right: 2px solid var(--theme-color);
            font-weight: 600;
        }

        .markdown-section {
            background-color: transparent !important;
            color: #f8fafc !important;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 15px;
        }

        .markdown-section h1,
        .markdown-section h2,
        .markdown-section h3 {
            color: #f8fafc !important;
            font-weight: 700;
            border-bottom: none !important;
        }

        .markdown-section a {
            color: var(--theme-color) !important;
            text-decoration: none;
        }

        .markdown-section a:hover {
            text-decoration: underline;
        }

        .markdown-section code {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: #e2e8f0 !important;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .markdown-section pre {
            background-color: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Obsidian Callouts 스타일 모사 */
        .markdown-section blockquote {
            border-left: 4px solid var(--theme-color) !important;
            background: rgba(56, 189, 248, 0.05) !important;
            color: #cbd5e1 !important;
            padding: 15px 20px !important;
            border-radius: 0 8px 8px 0;
        }

        /* 검색창 스타일링 */
        .search input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 8px !important;
            color: #f8fafc !important;
        }

        .search .clear-button {
            color: #94a3b8 !important;
        }
    </style>
</head>

<body>
    <div id="app">로딩 중... 🎓</div>

    <script>
        window.$docsify = {
            name: 'CS-Basic-Summary',
            repo: '',
            auto2top: true,
            // 메인 페이지로 README.md 사용
            homepage: 'README.md',
            // 사이드바 자동 생성 (_sidebar.md 사용)
            loadSidebar: true,
            // h1~h6 중 사이드바에 표시할 레벨
            maxLevel: 4,
            subMaxLevel: 3,
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '검색하세요...',
                noData: '결과가 없습니다!',
                depth: 6
            },
            copyCode: {
                buttonText: '복사',
                errorText: '에러',
                successText: '복사됨'
            }
        }
    </script>

    <!-- Docsify Core -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- Plugins -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
</body>

</html>
